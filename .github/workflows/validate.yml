name: validate submission

on:
  pull_request:
    paths:
      - "benchmarks/**"
      - ".github/scripts/validate_submission.py"

# A `pull_request` run triggered from a fork only ever gets a READ-ONLY
# GITHUB_TOKEN — declaring `pull-requests: write` here is silently ignored by
# GitHub, so this job must not try to comment or label (that's what broke on
# the first external fork PR). It validates (read-only) and uploads the report
# as an artifact; the privileged comment/label step lives in pr-comment.yml
# (`workflow_run`), which runs trusted base-repo code with a read-write token.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator deps
        run: pip install --quiet jsonschema zstandard pyyaml

      - name: Stage PR number for the comment workflow
        run: |
          mkdir -p /tmp/pr
          echo "${{ github.event.pull_request.number }}" > /tmp/pr/number

      # No continue-on-error: the validator exits 1 on `invalid`, which fails
      # this job and surfaces a red check on the PR. The steps below run with
      # `if: always()` so the report is still uploaded for the comment workflow.
      - name: Run validator
        run: |
          python .github/scripts/validate_submission.py \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --head-ref "${{ github.event.pull_request.head.sha }}" \
            --repo-root . \
            --report-md /tmp/pr/report.md \
            --report-json /tmp/pr/report.json

      - name: Append report to job summary
        if: always()
        run: cat /tmp/pr/report.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload PR comment payload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment-payload
          path: /tmp/pr/
          retention-days: 1
          if-no-files-found: warn
