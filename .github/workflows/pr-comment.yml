name: comment on submission PR

# Runs AFTER "validate submission" finishes. Because this is a `workflow_run`
# event, it executes the version of this file on the default branch with the
# base repo's GITHUB_TOKEN — which CAN be read-write even when the validate run
# was triggered by a fork PR. That's why commenting/labelling lives here and
# not in validate.yml (where fork PRs get a read-only token). No PR code is
# checked out or executed here, so the write token is safe.
on:
  workflow_run:
    workflows: ["validate submission"]
    types:
      - completed

permissions:
  actions: read # download the artifact from the validate run
  contents: read
  issues: write # PR comments + labels are issue endpoints
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Download PR comment payload
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: pr-comment-payload
          path: pr
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR and apply label
        if: steps.download.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const numRaw = (() => {
              try { return fs.readFileSync('pr/number', 'utf8').trim(); }
              catch (e) { return ''; }
            })();
            const issue_number = parseInt(numRaw, 10);
            if (!issue_number) {
              core.warning('No PR number in payload — nothing to comment on.');
              return;
            }

            let report;
            try { report = JSON.parse(fs.readFileSync('pr/report.json', 'utf8')); }
            catch (e) {
              core.warning('No JSON report — validator probably crashed; see the validate run logs.');
              return;
            }
            const md = fs.readFileSync('pr/report.md', 'utf8');

            const { owner, repo } = context.repo;
            const marker = '<!-- leaderboard-validate -->';
            const body = marker + '\n' + md;

            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

            const statusToLabel = {
              valid: 'valid-submission',
              invalid: 'invalid-submission',
              'needs-review': 'needs-review',
            };
            const target = statusToLabel[report.status];
            for (const lbl of Object.values(statusToLabel)) {
              if (lbl === target) continue;
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: lbl }); }
              catch (e) { /* not present, ignore */ }
            }
            if (target) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [target] });
            }
